<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어기초사전 데이터 비교 - 프로토타입</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: rgba(0, 0, 0, 0.45);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; color: #333;
  }

  /* 모달 */
  .modal {
    background: #fff; border-radius: 14px;
    width: 1100px; max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    position: relative;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 28px 16px; border-bottom: 1px solid #eee;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .modal-close {
    width: 32px; height: 32px; border: none; background: none;
    font-size: 20px; color: #999; cursor: pointer; border-radius: 6px;
  }
  .modal-close:hover { background: #f5f5f5; }

  /* 비교 영역 */
  .compare-body {
    flex: 1; overflow-y: auto; display: flex; gap: 0;
  }
  .compare-panel {
    flex: 1; padding: 20px 24px; overflow-y: auto;
  }
  .compare-panel.left { border-right: 2px solid #e8ecf0; }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .panel-label {
    font-size: 14px; font-weight: 700; color: #555;
    display: flex; align-items: center; gap: 6px;
  }
  .panel-label .label-icon {
    width: 22px; height: 22px; border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .panel-label.local .label-icon { background: #e8f5e9; }
  .panel-label.api .label-icon { background: #e8f1fd; }

  /* 검색바 (오른쪽 패널) */
  .api-search {
    display: flex; align-items: center; gap: 6px;
  }
  .api-search input {
    width: 120px; height: 32px; border: 1.5px solid #d0d7e0;
    border-radius: 6px; padding: 0 10px; font-size: 13px;
    outline: none; transition: border 0.15s;
  }
  .api-search input:focus { border-color: #4a9eff; }
  .api-search select {
    height: 32px; border: 1.5px solid #d0d7e0;
    border-radius: 6px; padding: 0 8px; font-size: 13px;
    outline: none; background: #fff; cursor: pointer;
  }
  .api-search .search-btn-sm {
    height: 32px; padding: 0 12px; border: none;
    background: #4a9eff; color: #fff; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .api-search .search-btn-sm:hover { background: #3a8eef; }

  /* 데이터 필드 */
  .field-group { margin-bottom: 16px; }
  .field-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 6px 0;
  }
  .field-label {
    font-size: 12px; font-weight: 600; color: #888;
    min-width: 60px; flex-shrink: 0;
  }
  .field-value { font-size: 14px; color: #333; line-height: 1.5; flex: 1; }

  .divider {
    height: 1px; background: #eee; margin: 12px 0;
  }

  /* 뜻/예문 카드 */
  .sense-card {
    background: #f9fafb; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px;
    border: 1px solid #eef0f3;
    transition: all 0.2s;
  }
  .sense-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .sense-num {
    font-size: 13px; font-weight: 700; color: #4a9eff;
  }
  .sense-def {
    font-size: 14px; color: #333; line-height: 1.6;
  }
  .sense-examples { margin-top: 8px; }
  .sense-example {
    font-size: 13px; color: #777; line-height: 1.5;
    padding: 3px 0 3px 12px;
    border-left: 2px solid #ddd;
    margin-top: 4px;
  }
  .sense-example em { color: #4a9eff; font-style: normal; }

  /* 차이점 하이라이트 */
  .diff-changed {
    background: #fffce5 !important; border-color: #f0e68c !important;
  }
  .diff-changed .sense-def { position: relative; }
  .diff-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 4px; margin-left: 6px;
    vertical-align: middle;
  }
  .diff-badge.changed { background: #fff3cd; color: #856404; }
  .diff-badge.added { background: #d4edda; color: #155724; }
  .diff-badge.removed { background: #f8d7da; color: #721c24; }

  .diff-added {
    background: #f0faf0 !important; border-color: #b7e4b7 !important;
  }

  /* 변경 사항 없음 */
  .no-diff {
    display: flex; flex-direction: column; align-items: center;
    padding: 24px; color: #999; font-size: 14px; gap: 6px;
  }

  /* 푸터 */
  .modal-footer {
    display: flex; justify-content: flex-end; align-items: center;
    padding: 14px 28px; border-top: 1px solid #eee; gap: 8px;
  }
  .btn {
    padding: 10px 20px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-ghost { background: #f0f0f0; color: #666; }
  .btn-ghost:hover { background: #e0e0e0; }
  .btn-primary { background: #4a9eff; color: #fff; }
  .btn-primary:hover { background: #3a8eef; }
  .btn-warning { background: #ff9800; color: #fff; }
  .btn-warning:hover { background: #e88a00; }
  .btn-success { background: #4caf50; color: #fff; }
  .btn-success:hover { background: #43a047; }

  .footer-info {
    flex: 1; font-size: 13px; color: #999;
    display: flex; align-items: center; gap: 12px;
  }
  .diff-summary-item {
    display: flex; align-items: center; gap: 4px;
  }
  .diff-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .diff-dot.changed { background: #ffc107; }
  .diff-dot.added { background: #4caf50; }

  /* 시나리오 탭 */
  .scenario-tabs {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.7); padding: 4px; border-radius: 10px; z-index: 100;
  }
  .scenario-tab {
    padding: 8px 16px; border: none; background: transparent;
    color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 500;
    border-radius: 7px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .scenario-tab:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .scenario-tab.active { background: rgba(255,255,255,0.2); color: #fff; font-weight: 600; }
  .scenario-tab .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.2); font-size: 10px; margin-right: 4px;
  }
  .scenario-tab.active .step-num { background: #4a9eff; }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .loading-panel {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 0; gap: 12px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #e0e0e0;
    border-top-color: #4a9eff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-panel p { font-size: 13px; color: #999; }

  /* 컨펌 모달 오버레이 */
  .confirm-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px;
    z-index: 10;
  }
  .confirm-modal {
    background: #fff;
    width: 440px;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    padding: 32px 28px 24px;
    text-align: center;
    animation: confirmIn 0.25s ease;
  }
  @keyframes confirmIn {
    from { opacity: 0; transform: scale(0.92) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .confirm-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: #fff3e0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 16px;
  }
  .confirm-title {
    font-size: 18px; font-weight: 700; color: #333;
    margin-bottom: 12px;
  }
  .confirm-desc {
    font-size: 14px; color: #666; line-height: 1.7;
    margin-bottom: 24px;
  }
  .confirm-actions {
    display: flex; gap: 10px; justify-content: center;
  }
  .confirm-btn {
    padding: 10px 28px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .confirm-btn-cancel {
    background: #f0f0f0; color: #666;
  }
  .confirm-btn-cancel:hover { background: #e0e0e0; }
  .confirm-btn-apply {
    background: #ff9800; color: #fff;
  }
  .confirm-btn-apply:hover { background: #e88a00; }
</style>
</head>
<body>

<!-- 시나리오 탭 -->
<div class="scenario-tabs">
  <button class="scenario-tab active" onclick="showStep(1)">
    <span class="step-num">1</span>비교 화면
  </button>
  <button class="scenario-tab" onclick="showStep(2)">
    <span class="step-num">2</span>수동 검색
  </button>
  <button class="scenario-tab" onclick="showStep(3)">
    <span class="step-num">3</span>컨펌 모달
  </button>
  <button class="scenario-tab" onclick="showStep(4)">
    <span class="step-num">4</span>반영 완료
  </button>
</div>

<div class="modal" id="modal"></div>

<script>
function localPanel() {
  return `
    <div class="compare-panel left">
      <div class="panel-header">
        <div class="panel-label local"><span class="label-icon">📂</span> 어휘 사전 (현재)</div>
      </div>
      <div class="field-group">
        <div class="field-row"><span class="field-label">어휘</span><span class="field-value" style="font-weight:600;">대체</span></div>
        <div class="field-row"><span class="field-label">어깨숫자</span><span class="field-value">2</span></div>
        <div class="field-row"><span class="field-label">분류</span><span class="field-value">일반 어휘</span></div>
      </div>
      <div class="divider"></div>
      <div class="sense-card">
        <div class="sense-header"><span class="sense-num">뜻 1</span></div>
        <div class="sense-def">다른 많은 것을 다 빼고 요점만 말하면.</div>
        <div class="sense-examples">
          <div class="sense-example">예 이 소설은 <em>대체</em>로 사랑 이야기입니다.</div>
        </div>
      </div>
    </div>`;
}

// 스텝 1: 비교 화면 (차이점 있음)
function step1() {
  return `
    <div class="modal-header">
      <h2>한국어기초사전 데이터 비교</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="compare-body">
      ${localPanel()}
      <div class="compare-panel">
        <div class="panel-header">
          <div class="panel-label api"><span class="label-icon">📘</span> 한국어기초사전</div>
          <div class="api-search">
            <input type="text" value="대체" readonly>
            <select><option>대체² (명사)</option><option>대체¹ (부사)</option><option>대체³ (명사)</option></select>
            <button class="search-btn-sm">검색</button>
          </div>
        </div>
        <div class="field-group fade-in">
          <div class="field-row"><span class="field-label">어휘</span><span class="field-value" style="font-weight:600;">대체</span></div>
          <div class="field-row"><span class="field-label">어깨숫자</span><span class="field-value">2</span></div>
          <div class="field-row"><span class="field-label">품사</span><span class="field-value">명사</span></div>
        </div>
        <div class="divider"></div>
        <div class="sense-card diff-changed fade-in">
          <div class="sense-header">
            <span class="sense-num">뜻 1</span>
            <span class="diff-badge changed">내용 변경</span>
          </div>
          <div class="sense-def">다른 것이나 다른 사람으로 대신함.</div>
          <div class="sense-examples">
            <div class="sense-example">예 이 소설은 <em>대체</em>로 사랑 이야기입니다.</div>
            <div class="sense-example">예 수업 시간에 선생님의 <em>대체</em> 교사가 왔다.</div>
          </div>
        </div>
        <div class="sense-card diff-added fade-in">
          <div class="sense-header">
            <span class="sense-num">뜻 2</span>
            <span class="diff-badge added">신규</span>
          </div>
          <div class="sense-def">어떤 대상의 자리에 다른 대상이 들어감.</div>
          <div class="sense-examples">
            <div class="sense-example">예 석유를 <em>대체</em>할 에너지원을 찾아야 한다.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="footer-info">
        <div class="diff-summary-item"><div class="diff-dot changed"></div> 변경 1건</div>
        <div class="diff-summary-item"><div class="diff-dot added"></div> 추가 1건</div>
      </div>
      <button class="btn btn-ghost">닫기</button>
      <button class="btn btn-warning" onclick="showStep(3)">변경사항 반영하기</button>
    </div>`;
}

// 스텝 2: 수동 검색 (다른 어깨숫자 선택)
function step2() {
  return `
    <div class="modal-header">
      <h2>한국어기초사전 데이터 비교</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="compare-body">
      ${localPanel()}
      <div class="compare-panel">
        <div class="panel-header">
          <div class="panel-label api"><span class="label-icon">📘</span> 한국어기초사전</div>
          <div class="api-search">
            <input type="text" value="대체">
            <select style="border-color: #4a9eff;">
              <option>대체¹ (부사)</option>
              <option selected>대체² (명사)</option>
              <option>대체³ (명사)</option>
            </select>
            <button class="search-btn-sm">검색</button>
          </div>
        </div>
        <div class="field-group fade-in" style="background: #f0f7ff; padding: 12px; border-radius: 8px; margin-bottom: 12px;">
          <div style="font-size: 13px; color: #4a9eff; font-weight: 600; margin-bottom: 8px;">📌 검색 결과 목록에서 비교할 항목을 선택하세요</div>
          <div class="field-row"><span class="field-label">어휘</span><span class="field-value" style="font-weight:600;">대체</span></div>
          <div class="field-row"><span class="field-label">어깨숫자</span><span class="field-value">1</span></div>
          <div class="field-row"><span class="field-label">품사</span><span class="field-value">부사</span></div>
        </div>
        <div class="divider"></div>
        <div class="sense-card fade-in">
          <div class="sense-header"><span class="sense-num">뜻 1</span></div>
          <div class="sense-def">'도대체'의 준말.</div>
          <div class="sense-examples">
            <div class="sense-example">예 <em>대체</em> 무슨 일이 있었던 거야?</div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="footer-info">
        <span style="color: #999; font-size: 13px;">어깨숫자가 다른 항목을 비교 중입니다.</span>
      </div>
      <button class="btn btn-ghost">닫기</button>
      <button class="btn btn-warning" disabled style="opacity:0.5; cursor:default;">변경사항 반영하기</button>
    </div>`;
}

// 스텝 3: 컨펌 모달 (비교 화면 위에 오버레이)
function step3() {
  return `
    <div class="modal-header">
      <h2>한국어기초사전 데이터 비교</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="compare-body" style="filter: blur(1px); opacity: 0.6;">
      ${localPanel()}
      <div class="compare-panel">
        <div class="panel-header">
          <div class="panel-label api"><span class="label-icon">📘</span> 한국어기초사전</div>
          <div class="api-search">
            <input type="text" value="대체" readonly>
            <select><option>대체² (명사)</option></select>
            <button class="search-btn-sm">검색</button>
          </div>
        </div>
        <div class="field-group">
          <div class="field-row"><span class="field-label">어휘</span><span class="field-value" style="font-weight:600;">대체</span></div>
          <div class="field-row"><span class="field-label">어깨숫자</span><span class="field-value">2</span></div>
          <div class="field-row"><span class="field-label">품사</span><span class="field-value">명사</span></div>
        </div>
        <div class="divider"></div>
        <div class="sense-card diff-changed">
          <div class="sense-header">
            <span class="sense-num">뜻 1</span>
            <span class="diff-badge changed">내용 변경</span>
          </div>
          <div class="sense-def">다른 것이나 다른 사람으로 대신함.</div>
        </div>
        <div class="sense-card diff-added">
          <div class="sense-header">
            <span class="sense-num">뜻 2</span>
            <span class="diff-badge added">신규</span>
          </div>
          <div class="sense-def">어떤 대상의 자리에 다른 대상이 들어감.</div>
        </div>
      </div>
    </div>
    <div class="modal-footer" style="filter: blur(1px); opacity: 0.6;">
      <div class="footer-info">
        <div class="diff-summary-item"><div class="diff-dot changed"></div> 변경 1건</div>
        <div class="diff-summary-item"><div class="diff-dot added"></div> 추가 1건</div>
      </div>
      <button class="btn btn-ghost">닫기</button>
      <button class="btn btn-warning">변경사항 반영하기</button>
    </div>
    <!-- 컨펌 모달 오버레이 -->
    <div class="confirm-overlay">
      <div class="confirm-modal">
        <div class="confirm-icon">⚠️</div>
        <div class="confirm-title">한국어기초사전 데이터로 변경</div>
        <div class="confirm-desc">
          현재 어휘 상세 데이터를 한국어기초사전 데이터로 변경할까요?<br>
          기존에 입력되어 있던 내용이 모두 대체되므로 신중히 선택해주세요.
        </div>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-btn-cancel" onclick="showStep(1)">취소</button>
          <button class="confirm-btn confirm-btn-apply" onclick="showStep(4)">변경하기</button>
        </div>
      </div>
    </div>`;
}

// 스텝 4: 반영 완료
function step4() {
  return `
    <div class="modal-header">
      <h2>한국어기초사전 데이터 비교</h2>
      <button class="modal-close">✕</button>
    </div>
    <div class="compare-body">
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 60px; gap: 16px;">
        <div style="width:64px; height:64px; border-radius:50%; background:#e8f5e9; display:flex; align-items:center; justify-content:center; font-size:32px;">✓</div>
        <div style="font-size:18px; font-weight:700; color:#333;">한국어기초사전 데이터가 반영되었습니다</div>
        <div style="font-size:14px; color:#888; text-align:center; line-height:1.6;">
          어휘 상세 페이지의 입력 필드가 한국어기초사전 데이터로 변경되었습니다.<br>
          변경된 내용을 확인한 후 페이지를 저장해주세요.
        </div>
        <div style="margin-top: 12px; display:flex; gap:12px;">
          <div style="padding:8px 16px; background:#f0faf0; border-radius:8px; font-size:13px; color:#2e7d32;">
            <strong>변경</strong> 뜻 1 — 정의 및 예문 업데이트
          </div>
          <div style="padding:8px 16px; background:#f0faf0; border-radius:8px; font-size:13px; color:#2e7d32;">
            <strong>추가</strong> 뜻 2 — 신규 등록
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <div class="footer-info"></div>
      <button class="btn btn-primary">닫기</button>
    </div>`;
}

function showStep(n) {
  const modal = document.getElementById('modal');
  const stepFns = { 1: step1, 2: step2, 3: step3, 4: step4 };
  modal.innerHTML = stepFns[n]();
  modal.classList.add('fade-in');
  setTimeout(() => modal.classList.remove('fade-in'), 300);

  document.querySelectorAll('.scenario-tab').forEach((t, i) => {
    t.classList.toggle('active', i === n - 1);
  });
}

showStep(1);
</script>
</body>
